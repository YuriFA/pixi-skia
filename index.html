<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixi and Skia render</title>
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <div class="panel__header">
          <span class="panel__label panel__label--pixi">Pixi</span>
          <button
            type="button"
            id="random-graphics-button"
            class="panel__control panel__control--random-graphics"
          >
            Random graphics
          </button>
          <button
            type="button"
            id="random-sprite-button"
            class="panel__control panel__control--random-sprite"
          >
            Random sprite
          </button>
          <button type="button" id="clear-button" class="panel__control panel__control--clear">
            Clear
          </button>
        </div>
        <div class="app" id="root-pixi"></div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <span class="panel__label panel__label--skia">Skia</span>
          <button
            type="button"
            id="export-pdf-button"
            class="panel__control panel__control--export"
          >
            Export to PDF
          </button>
        </div>
        <div class="app" id="root-skia"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
